name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Download libv2ray.aar (latest release)
        run: |
          mkdir -p V2rayNG/app/libs
          API_URL="https://api.github.com/repos/2dust/AndroidLibXrayLite/releases/latest"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" > /tmp/androidlibxraylite_latest.json
          DOWNLOAD_URL="$(python3 - <<'PY'
          import json
          with open('/tmp/androidlibxraylite_latest.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          for asset in data.get('assets', []):
              if asset.get('name') == 'libv2ray.aar':
                  print(asset.get('browser_download_url', ''))
                  break
          PY
          )"
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "libv2ray.aar asset not found in latest release"
            exit 1
          fi
          curl -fL "$DOWNLOAD_URL" -o V2rayNG/app/libs/libv2ray.aar

      - name: Prepare Gradle wrapper
        working-directory: V2rayNG
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          chmod +x gradlew

      - name: Build
        working-directory: V2rayNG
        run: ./gradlew --no-daemon assemblePlaystoreDebug

      - name: Test
        working-directory: V2rayNG
        run: ./gradlew --no-daemon test

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: playstore-debug-apk
          path: V2rayNG/app/build/outputs/apk/playstore/debug/*.apk
